<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SD Task List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <header>
        <h1>SD Task List</h1>
        <h2>Maintening the life in programming studies</h2>
    </header>
    <main>
        <form action="submit">
            <section>
                <input type="text" name="taskName" id="taskName" placeholder="Task name...">
                <textarea name="taskDesc" id="taskDesc" placeholder="Task Description..."></textarea>
                <input type="date" name="taskDate" id="taskDate">
            </section>
            <button type="button" id="taskBt">Register Task</button>
        </form>
        <section class="tasks">
        </section>
        <button type="button" class="deleteTasks"><i class="fa-solid fa-trash"></i></button>
    </main>
    <script src="main.js"></script>
</body>

</html>
